<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Moment Out of Place | Stackly Weddings</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../assets/css/404.css" />
  </head>

  <body>
    <!-- Floral Watermarks -->
    <div class="floral-watermark floral-tl" id="wm-tl">
      <span class="material-symbols-outlined">local_florist</span>
    </div>
    <div class="floral-watermark floral-br" id="wm-br">
      <span class="material-symbols-outlined">spa</span>
    </div>

    <!-- Animated Petals -->
    <div id="petal-container"></div>

    <!-- Main Content -->
    <main class="container py-5 fade-in">
      <div class="d-flex flex-column align-items-center text-center">
        <!-- Heading + Subheading -->
        <div class="mb-5" style="max-width: 640px">
          <h1 class="display-title-404 mb-4">404</h1>
          <h1 class="display-title mb-4">A Moment Out of Place</h1>
          <p class="kicker-text px-2">
            "Like a wildflower in a garden of roses, this path has no flowers
            yet. The page you are looking for has wandered away from the
            celebration."
          </p>
        </div>

        <!-- Actions -->
        <div
          class="d-flex flex-column align-items-center w-100"
          style="max-width: 520px; gap: 2.5rem"
        >
          <p class="section-label mb-3">Let us guide you back</p>

          <div class="d-flex flex-wrap justify-content-center gap-3">
            <!-- Back Home -->
            <a href="/" class="btn-cta">
              <span
                class="material-symbols-outlined"
                style="font-size: 1.25rem"
              >
                home
              </span>
              Back to Home
            </a>

            <!-- Go Back -->
            <button class="btn-cta btn-secondary-cta" onclick="history.back()">
              <span
                class="material-symbols-outlined"
                style="font-size: 1.25rem"
              >
                arrow_back
              </span>
              Go Back
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      /* ── Floating Petals ─────────────────────────────── */
      const container = document.getElementById("petal-container");

      function createPetal() {
        const petal = document.createElement("div");
        petal.className = "floating-petal";

        const startX = Math.random() * window.innerWidth;
        const duration = 8 + Math.random() * 7;
        const delay = Math.random() * 10;
        const size = 10 + Math.random() * 10;

        petal.style.left = `${startX}px`;
        petal.style.top = "-20px";
        petal.style.width = `${size}px`;
        petal.style.height = `${size}px`;
        petal.style.animationDuration = `${duration}s`;
        petal.style.animationDelay = `${delay}s`;

        container.appendChild(petal);
        setTimeout(
          () => {
            petal.remove();
            createPetal();
          },
          (duration + delay) * 1000,
        );
      }

      for (let i = 0; i < 12; i++) createPetal();

      /* ── Parallax watermarks on mouse move ───────────── */
      const wmTl = document.getElementById("wm-tl");
      const wmBr = document.getElementById("wm-br");

      window.addEventListener("mousemove", (e) => {
        const x = e.clientX / window.innerWidth - 0.5;
        const y = e.clientY / window.innerHeight - 0.5;
        wmTl.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
        wmBr.style.transform = `translate(${x * 35}px, ${y * 35}px)`;
      });
    </script>
  </body>
</html>
